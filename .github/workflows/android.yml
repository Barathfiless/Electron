name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Mobile App Wrapper Dependencies
      run: |
        cd mobile-app
        npm install

    - name: Build Web Companion Assets
      run: |
        cd mobile-app
        npm run build

    - name: Sync Capacitor Web Assets
      run: |
        cd mobile-app
        npx cap sync android

    - name: Build Android Debug APK
      run: |
        cd mobile-app/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: electron-mobile-debug-apk
        path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
